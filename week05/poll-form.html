<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Survey Poll </title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header>

        <h1>Quick Survey Poll</h1>
    </header>


    <main>
        <form>
            <div class="form-item column2">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>
            <div class="form-item column2 ">
                <label for="email">Your Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-item column1">
                <label for="browser">Select Browser</label>
                <select name="browser" id="browser">
                    <option value="1">Chrome</option>
                    <option value="2">Brave</option>
                    <option value="3">Edge</option>
                </select>
            </div>


            <div class="form-item column1">
                <label for="pet"> Do you have a household pet?</label>
                <input type="checkbox" id="pet" name="pet">
            </div>
            <div class="form-item column1">
                <label for="feedback">List the places you have lived:</label>
                <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Stillwater Florida, Amsterdam Netherland, Tibuktu Mali"></textarea>
            </div>
            <button type="submit">Submit Poll</button>
        </form>

    </main>

    <footer>

    </footer>
</body>
